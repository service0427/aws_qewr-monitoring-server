<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qewr Monitoring</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖥️</text></svg>">
    <link rel="stylesheet" href="/static/style.css?v=3.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-main">
                <div class="brand">
                    <i class="fas fa-server logo-icon"></i>
                    <span class="brand-name">QEWR MONITOR</span>
                </div>
                <div class="installer-copy-box" onclick="copyInstallerCommand()">
                    <i class="fas fa-terminal"></i>
                    <span id="installer-cmd">curl -sSL https://raw.githubusercontent.com/service0427/init/main/install.sh | sudo bash</span>
                    <i class="far fa-copy"></i>
                </div>
            </div>
        </header>

        <!-- Stats Overview Section -->
        <section class="stats-overview-section">
            <div class="stats-grid">
                <div class="stats-card total active-filter" onclick="filterServers('all')">
                    <div class="stats-icon"><i class="fas fa-server"></i></div>
                    <div class="stats-info">
                        <span class="stats-label">전체 서버</span>
                        <span id="stats-total-val" class="stats-value">0</span>
                    </div>
                </div>
                <div class="stats-card success" onclick="filterServers('online')">
                    <div class="stats-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stats-info">
                        <span class="stats-label">활성화 (정상)</span>
                        <span id="stats-online-val" class="stats-value">0</span>
                    </div>
                </div>
                <div class="stats-card warning" onclick="filterServers('warning')">
                    <div class="stats-icon"><i class="fas fa-exclamation-circle"></i></div>
                    <div class="stats-info">
                        <span class="stats-label">장애 (경고)</span>
                        <span id="stats-alert-val" class="stats-value">0</span>
                    </div>
                </div>
                <div class="stats-card danger" onclick="filterServers('offline')">
                    <div class="stats-icon"><i class="fas fa-times-circle"></i></div>
                    <div class="stats-info">
                        <span class="stats-label">비활성화 (장애)</span>
                        <span id="stats-offline-val" class="stats-value">0</span>
                    </div>
                </div>
                <div class="stats-card adb">
                    <div class="stats-icon"><i class="fas fa-mobile-alt"></i></div>
                    <div class="stats-info">
                        <span class="stats-label">ADB 기기 연결</span>
                        <span id="stats-adb-val" class="stats-value">0 / 0</span>
                    </div>
                </div>
            </div>
        </section>

        <main id="server-list">
            <div class="loading">서버 상태를 불러오는 중...</div>
        </main>

        <!-- 상세보기 모달 -->
        <div id="detail-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <h2 id="modal-server-name">Server Details</h2>
                <div id="modal-spec-list" class="spec-list"></div>
                
                <div id="remote-access-section" class="remote-access-section" style="display: none;">
                    <a id="modal-remote-btn" href="#" target="_blank" class="remote-btn-large">
                        <i class="fas fa-desktop"></i> Open Remote Control (scrcpy)
                    </a>
                </div>

                <div class="metrics-history-section">
                    <button class="view-metrics-btn" onclick="toggleMetrics()">View Historical Metrics (Last 7 Days)</button>
                    <div id="metrics-history-list" style="display: none;">
                        <table class="metrics-table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>CPU</th>
                                    <th>MEM</th>
                                    <th>Disk</th>
                                </tr>
                            </thead>
                            <tbody id="metrics-data"></tbody>
                        </table>
                    </div>
                </div>

                <div class="memo-section">
                    <label class="spec-label">Installation Location:</label>
                    <input type="text" id="modal-location-input" class="memo-input" placeholder="e.g. Rack A, Seoul Office...">
                    <label class="spec-label" style="margin-top: 10px; display: block;">Server Memo / Note:</label>
                    <input type="text" id="modal-memo-input" class="memo-input" placeholder="e.g. Main database, backup agent...">
                    <button class="save-btn" onclick="saveMemoAndLocation()">Save Location & Memo</button>
                </div>

                <!-- Alert Settings Section -->
                <div class="settings-section">
                    <h3>Alert Settings</h3>
                    <div class="setting-row">
                        <label>CPU Threshold (%)</label>
                        <input type="number" id="cpu-threshold" class="small-input">
                        <label class="switch"><input type="checkbox" id="cpu-alert-toggle"><span class="slider"></span></label>
                    </div>
                    <div class="setting-row">
                        <label>MEM Threshold (%)</label>
                        <input type="number" id="mem-threshold" class="small-input">
                        <label class="switch"><input type="checkbox" id="mem-alert-toggle"><span class="slider"></span></label>
                    </div>
                    <div class="setting-row">
                        <label>DSK Threshold (%)</label>
                        <input type="number" id="disk-threshold" class="small-input">
                        <label class="switch"><input type="checkbox" id="disk-alert-toggle"><span class="slider"></span></label>
                    </div>
                    <div class="setting-row">
                        <label>Remote Button (Port 5000)</label>
                        <select id="remote-access-type" class="small-select">
                            <option value="0">Off</option>
                            <option value="1">Public IPv4</option>
                            <option value="2">Tailscale IP</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <label>Expected ADB Devices</label>
                        <input type="number" id="expected-devices" class="small-input" min="0">
                    </div>
                    <button class="save-btn secondary" onclick="saveAlertSettings()">Save Alert Settings</button>
                </div>

                <div class="danger-zone">
                    <button class="delete-btn" onclick="confirmDelete()">Delete Server</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js?v=3.3"></script>
</body>
</html>
